# Auto-generated from palette.json — do not edit manually
# Run `bun run generate` to regenerate
#
# Mind the Gap — tmux theme
# https://github.com/danfry1/mind-the-gap

set -ga terminal-overrides ",*:RGB"

set -g status-style "bg=#081020,fg=#a8b0c0"
set -g status-left-length 40
set -g status-right-length 40
set -g status-left "#{?client_prefix,#[fg=#04081a#,bg=#F3A9BB#,bold] PREFIX ,#[fg=#04081a,bg=#9B70D8,bold] #{session_name} }#[fg=default,bg=#081020,nobold] "
set -g status-right "#[fg=#708098] %H:%M #[fg=#708098]│ #[fg=#708098]#{host_short} "

set -g window-status-format "#[fg=#708098,bg=#081020] #{window_index}:#{window_name} "
set -g window-status-current-format "#[fg=#d8dce8,bg=#162038,bold] #{window_index}:#{window_name} "
set -g window-status-separator ""

set -g pane-border-style "fg=#1e2844"
set -g pane-active-border-style "fg=#9B70D8"

set -g mode-style "fg=#04081a,bg=#9B70D8"

set -g mesdistrict-style "fg=#d8dce8,bg=#162038"
set -g mesdistrict-command-style "fg=#d8dce8,bg=#162038"

set -g clock-mode-colour "#9B70D8"

set -g copy-mode-match-style "fg=#04081a,bg=#FFD300"
set -g copy-mode-current-match-style "fg=#04081a,bg=#EE7C0E"
